# 18-E: OpenSSF Scorecard — supply-chain hygiene score, public.
#
# Runs weekly and on pushes to main. All actions are pinned by
# commit SHA (not tag) so the `Pinned-Dependencies` check stays
# green. Comments after the SHA name the release the SHA was
# resolved from, so Dependabot or a human can bump them safely.

name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "37 6 * * 1"  # Monday 06:37 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF findings to Security tab
      id-token: write          # keyless publish of results
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif
