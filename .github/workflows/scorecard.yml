# 18-E: OpenSSF Scorecard — supply-chain hygiene score, public.
#
# Runs weekly and on pushes to main. All actions are pinned by
# commit SHA (not tag) so the `Pinned-Dependencies` check stays
# green. Comments after the SHA name the release the SHA was
# resolved from, so Dependabot or a human can bump them safely.

name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "37 6 * * 1"  # Monday 06:37 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF findings to Security tab
      id-token: write          # keyless publish of results
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          sarif_file: results.sarif
