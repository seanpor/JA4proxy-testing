name: ci

on:
  push:
    branches: [main, review-fixes]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install dev tools (ansible-lint, yamllint, jinja2, ruff, pymarkdownlnt)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r deploy/requirements.yml

      - name: make lint
        env:
          YAMLLINT: yamllint
          ANSIBLE_LINT: ansible-lint
          ANSIBLE_PLAYBOOK: ansible-playbook
        run: make lint

      - name: make test
        env:
          # Phase 20 P1-7: check_workflow_pins.py resolves each pinned
          # SHA against `gh api repos/<o>/<r>/git/ref/tags/<tag>`. The
          # runner ships `gh` but does not auto-wire a token, so the
          # unauthenticated rate limit (60/h shared per IP) trips the
          # checker. Passing the workflow token keeps it strict.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make test

  image-scan:
    # 18-B: Trivy scan of every compose image for fixable HIGH/CRITICAL
    # vulns. Runs in parallel with lint-and-test. **Required** status
    # check on `main` (Phase 20 follow-up) — a red scan mechanically
    # blocks merge, same as `lint-and-test`.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install jinja2 + pyyaml (for render_compose.py)
        run: python -m pip install --upgrade pip jinja2 pyyaml

      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      # `make scan-images` runs `scripts/ci/scan_images.sh`, which
      # since 21-E scans both every compose image (HIGH+CRITICAL,
      # fixed-only, `.trivyignore`-aware) *and* the rendered compose
      # SBOM at `/tmp/compose.cdx.json` (Phase 20 P1-8 — giving the
      # shipped SBOM a consumer). Keeping the SBOM scan inside the
      # wrapper means `make lint-all` locally exercises the same
      # gates as this job. `check_local_ci_parity.py` enforces.
      - name: make scan-images
        run: make scan-images

      - name: Upload compose SBOM as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: compose-sbom
          path: /tmp/compose.cdx.json
          retention-days: 30
