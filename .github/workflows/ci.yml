name: ci

on:
  push:
    branches: [main, review-fixes]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install dev tools (ansible-lint, yamllint, jinja2, ruff, pymarkdownlnt)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r deploy/requirements.yml

      - name: make lint
        env:
          YAMLLINT: yamllint
          ANSIBLE_LINT: ansible-lint
          ANSIBLE_PLAYBOOK: ansible-playbook
        run: make lint

      - name: make test
        run: make test

  image-scan:
    # 18-B: Trivy scan of every compose image for fixable HIGH/CRITICAL
    # vulns. Runs in parallel with lint-and-test. Not required to merge
    # while the Trivy DB churns, but a red run is a merge-blocker
    # signal in PR review.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install jinja2 + pyyaml (for render_compose.py)
        run: python -m pip install --upgrade pip jinja2 pyyaml

      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: make scan-images
        run: make scan-images
