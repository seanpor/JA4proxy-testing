[defaults]
inventory = deploy/inventory/hosts.ini
roles_path = deploy/roles
remote_user = root
host_key_checking = False
retry_files_enabled = False
gathering = smart
fact_caching = memory
timeout = 60

[inventory]
enable_plugins = ini, constructed

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
