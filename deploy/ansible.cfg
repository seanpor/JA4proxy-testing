[defaults]
inventory = deploy/inventory/hosts.ini
roles_path = deploy/roles
remote_user = root
# TOFU (trust on first use) — first connection pins the host key into
# ~/.ssh/known_hosts, subsequent connections verify against it.
# provision-alibaba-cloud.sh performs the pre-pin on fresh VMs.
host_key_checking = True
retry_files_enabled = False
gathering = smart
fact_caching = memory
timeout = 60
# Vault password file — generate-secrets.sh creates it on first run.
# Override per-invocation with --vault-password-file or
# ANSIBLE_VAULT_PASSWORD_FILE in the environment (CI uses the env var).
vault_password_file = deploy/.vault/.vault-pass

[inventory]
enable_plugins = ini, constructed

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# accept-new: record on first connect, refuse on mismatch afterwards.
# This is the safe middle ground between False (never verify) and
# yes (demand the key be pre-pinned, which breaks fresh-VM bootstrap).
ssh_args = -o StrictHostKeyChecking=accept-new -o ControlMaster=auto -o ControlPersist=60s
