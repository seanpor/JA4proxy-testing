# 13-F: Prometheus alert rules. Delivery (Alertmanager) lands in 13-D;
# until then these rules fire in-process and are visible via
# /alerts and the ALERTS{alertstate="firing"} metric, but nothing
# pages anyone.
#
# Keep this list small and focused on *silent* failure modes —
# things an operator wouldn't otherwise notice until it's too late.
groups:
  - name: certificates
    interval: 60s
    rules:
      - alert: CertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 7 * 24 * 3600
        for: 10m
        labels:
          severity: warning
          component: caddy
        annotations:
          summary: "TLS cert for {{ $labels.instance }} expires in under 7 days"
          description: |
            Caddy should be renewing this automatically. If this alert has
            fired for 10+ minutes the renewal pipeline is stuck. Check:
              - docker logs ja4proxy-caddy (ACME failures)
              - DNS A record resolves to this VM
              - UFW still permits 80/tcp (Let's Encrypt HTTP-01 challenge)
          runbook: "docs/phases/RUNBOOK.md"

  # 13-E: service-health and resource alerts. These cover silent
  # failure modes an operator wouldn't notice without active
  # monitoring. Alertmanager (13-D) delivers them.
  - name: services
    interval: 60s
    rules:
      - alert: JA4proxyDown
        expr: up{job="ja4proxy"} == 0
        for: 2m
        labels:
          severity: critical
          component: ja4proxy
        annotations:
          summary: "JA4proxy metrics endpoint unreachable for >2m"
          description: |
            Prometheus cannot scrape JA4proxy. The service may have
            crashed or the metrics port is unreachable.
              systemctl status ja4proxy
              journalctl -u ja4proxy -n 50
          runbook: "docs/phases/RUNBOOK.md"

      - alert: HAProxyDown
        expr: up{job="haproxy-csv"} == 0
        for: 2m
        labels:
          severity: critical
          component: haproxy
        annotations:
          summary: "HAProxy stats endpoint unreachable for >2m"
          description: |
            HAProxy is either down or the stats socket is not
            responding. TLS passthrough to JA4proxy is broken.
              docker compose logs haproxy
          runbook: "docs/phases/RUNBOOK.md"

      # Redis runs as a systemd-managed Docker container. JA4proxy
      # does not export a redis_connected gauge, so we detect Redis
      # failure indirectly: if JA4proxy is up but its scrape shows
      # zero ban-list entries AND connections are flowing, Redis is
      # likely unreachable. This is a best-effort heuristic — a
      # dedicated Redis exporter would be more precise but adds
      # another container. The `absent()` fallback catches the case
      # where the metric simply doesn't exist yet.
      - alert: RedisDown
        expr: |
          up{job="ja4proxy"} == 1
          and (absent(ja4proxy_redis_connected) or ja4proxy_redis_connected == 0)
        for: 5m
        labels:
          severity: warning
          component: redis
        annotations:
          summary: "JA4proxy may have lost Redis connectivity for >5m"
          description: |
            Ban lookups and rate-limit counters may be unavailable.
            JA4proxy continues to proxy traffic but cannot enforce
            bans. If ja4proxy_redis_connected is not exported by
            your JA4proxy build, this alert fires on absent() —
            consider adding a Redis exporter for precision.
              systemctl status ja4proxy-redis
              docker logs ja4proxy-redis
          runbook: "docs/phases/RUNBOOK.md"

      # NoTrafficLastHour fires after `for: 1h` on a 1h-window
      # increase() == 0, meaning ~2h of actual silence before the
      # alert fires. This is deliberate: short quiet spells are
      # common on research honeypots; we only care about sustained
      # silence that indicates a forwarding failure.
      - alert: NoTrafficLastHour
        expr: increase(ja4proxy_connections_total[1h]) == 0
        for: 1h
        labels:
          severity: warning
          component: ja4proxy
        annotations:
          summary: "Zero connections to JA4proxy in the last ~2h"
          description: |
            increase() window (1h) + for (1h) = ~2h of silence
            before this fires. May be normal during low-traffic
            periods, but sustained silence often means HAProxy or
            UFW stopped forwarding.
          runbook: "docs/phases/RUNBOOK.md"

      # DiskFull: no node_exporter in the compose stack, so we use
      # Prometheus's own TSDB metrics as a proxy for disk pressure.
      # The default retention size is 10GB; 90% = 9GB threshold.
      # If you change ja4proxy_prometheus_retention_size, update
      # this threshold to match.
      - alert: DiskFull
        expr: prometheus_tsdb_storage_blocks_bytes > 9e9
        for: 10m
        labels:
          severity: critical
          component: host
        annotations:
          summary: "Prometheus TSDB >90% of 10GB retention cap for >10m"
          description: |
            TSDB is approaching the configured size retention limit
            (default 10GB, alert at 9GB). This is a proxy for disk
            pressure — no node_exporter in the stack. If this fires,
            Loki or journald may also be growing.
            See RUNBOOK scenario 4 (Disk full).
              du -sh /var/lib/docker/volumes/* /var/log/*
          runbook: "docs/phases/RUNBOOK.md"

  - name: probes
    interval: 60s
    rules:
      - alert: HoneypotProbeFailing
        expr: probe_success == 0
        for: 15m
        labels:
          severity: critical
          component: honeypot
        annotations:
          summary: "Blackbox probe of {{ $labels.instance }} failing"
          description: |
            External HTTPS probe has been failing for 15+ minutes.
            The honeypot is either down or unreachable from the
            Prometheus container's network path.
          runbook: "docs/phases/RUNBOOK.md"
