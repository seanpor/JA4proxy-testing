---
# Build JA4proxy binary on the control machine, or use a pre-built binary

- name: Check if prebuilt binary path is provided
  tags: [artifacts, phase2]
  ansible.builtin.stat:
    path: "{{ ja4proxy_prebuilt_binary_path }}"
  delegate_to: localhost
  become: false
  register: prebuilt_check
  when: ja4proxy_prebuilt_binary_path is defined and ja4proxy_prebuilt_binary_path | length > 0

- name: Use prebuilt binary
  block:
    - name: Verify prebuilt binary exists
      ansible.builtin.assert:
        that:
          - prebuilt_check.stat.exists
        fail_msg: "Prebuilt binary not found at {{ ja4proxy_prebuilt_binary_path }}"

    - name: Record source-side SHA256 of prebuilt binary
      ansible.builtin.stat:
        path: "{{ ja4proxy_prebuilt_binary_path }}"
        checksum_algorithm: sha256
        get_checksum: true
      delegate_to: localhost
      become: false
      register: prebuilt_source_stat

    # 14-B: optionally gate on a pinned hash so the operator can't hand
    # the playbook the wrong binary. Sentinel value (64 zeros) means
    # "not pinned yet"; real hash means "must match exactly".
    - name: Read pinned binary sha256 from deploy/expected-binary-sha256.txt
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/../expected-binary-sha256.txt"
      delegate_to: localhost
      become: false
      register: _pinned_sha256_raw

    - name: Parse pinned binary sha256
      ansible.builtin.set_fact:
        _pinned_sha256: "{{ (_pinned_sha256_raw.content | b64decode).split()[0] }}"

    - name: Assert prebuilt binary matches pinned sha256
      ansible.builtin.assert:
        that:
          - prebuilt_source_stat.stat.checksum == _pinned_sha256
        fail_msg: >-
          Prebuilt binary sha256 does not match pin.
          Expected: {{ _pinned_sha256 }}
          Got:      {{ prebuilt_source_stat.stat.checksum }}
          Update deploy/expected-binary-sha256.txt if the new hash is intentional.
        success_msg: "Prebuilt binary matches pin: {{ _pinned_sha256 }}"
      when: _pinned_sha256 != ('0' * 64)

    - name: Copy prebuilt binary to target
      ansible.builtin.copy:
        src: "{{ ja4proxy_prebuilt_binary_path }}"
        dest: "{{ ja4proxy_bin_dir }}/ja4proxy"
        owner: "{{ ja4proxy_system_user }}"
        group: "{{ ja4proxy_system_group }}"
        mode: "0750"

    - name: Record target-side SHA256 of deployed binary
      ansible.builtin.stat:
        path: "{{ ja4proxy_bin_dir }}/ja4proxy"
        checksum_algorithm: sha256
        get_checksum: true
      register: prebuilt_target_stat

    - name: Assert deployed binary matches source checksum
      ansible.builtin.assert:
        that:
          - prebuilt_target_stat.stat.checksum == prebuilt_source_stat.stat.checksum
        fail_msg: >-
          Binary checksum mismatch after copy.
          Source: {{ prebuilt_source_stat.stat.checksum }}
          Target: {{ prebuilt_target_stat.stat.checksum }}
        success_msg: "JA4proxy binary SHA256 verified: {{ prebuilt_target_stat.stat.checksum }}"
        quiet: false

  when: ja4proxy_prebuilt_binary_path is defined and ja4proxy_prebuilt_binary_path | length > 0

- name: Build from source
  block:
    - name: Verify Go repo path exists
      ansible.builtin.stat:
        path: "{{ ja4proxy_build_machine_go_path }}"
      delegate_to: localhost
      become: false
      register: repo_check

    # 18-C: govulncheck against the Go source tree before we spend
    # time building or touching the target. Reachable vuln → task
    # fails (govulncheck's own non-zero exit) and the play aborts
    # before any binary reaches the target. Missing govulncheck →
    # loud WARN and skip (air-gapped build host). Run when
    # ja4proxy_govulncheck_enabled is true (default).

    - name: Probe for govulncheck on control machine (18-C)
      ansible.builtin.command:
        cmd: govulncheck -version
      delegate_to: localhost
      become: false
      register: _govulncheck_probe
      changed_when: false
      failed_when: false
      when: ja4proxy_govulncheck_enabled | default(true) | bool

    - name: Warn when govulncheck is not installed (18-C)
      ansible.builtin.debug:
        msg: >-
          govulncheck not found on control machine — skipping Go source
          vulnerability scan. Install with:
          `go install golang.org/x/vuln/cmd/govulncheck@latest`
      when:
        - ja4proxy_govulncheck_enabled | default(true) | bool
        - _govulncheck_probe.rc is defined
        - _govulncheck_probe.rc != 0

    - name: Run govulncheck against Go source tree (18-C)
      ansible.builtin.command:
        cmd: govulncheck ./...
        chdir: "{{ ja4proxy_build_machine_go_path }}"
      delegate_to: localhost
      become: false
      register: _govulncheck_run
      changed_when: false
      when:
        - ja4proxy_govulncheck_enabled | default(true) | bool
        - _govulncheck_probe.rc is defined
        - _govulncheck_probe.rc == 0

    - name: Build JA4proxy binary (cross-compile for Linux amd64)
      ansible.builtin.command:
        cmd: >
          bash -c '
            cd {{ ja4proxy_build_machine_go_path }} &&
            GOOS=linux GOARCH=amd64 CGO_ENABLED=0
            GOFLAGS="{{ ja4proxy_go_build_flags }}"
            make go-build
          '
      delegate_to: localhost
      become: false
      args:
        chdir: "{{ ja4proxy_build_machine_go_path }}"
      register: build_result
      changed_when: true

    - name: Verify binary is static ELF
      ansible.builtin.command:
        cmd: file {{ ja4proxy_build_machine_go_path }}/bin/proxy
      delegate_to: localhost
      become: false
      register: file_check
      changed_when: false

    - name: Record source-side SHA256 of freshly-built binary
      ansible.builtin.stat:
        path: "{{ ja4proxy_build_machine_go_path }}/bin/proxy"
        checksum_algorithm: sha256
        get_checksum: true
      delegate_to: localhost
      become: false
      register: build_source_stat

    - name: Copy built binary to target
      ansible.builtin.copy:
        src: "{{ ja4proxy_build_machine_go_path }}/bin/proxy"
        dest: "{{ ja4proxy_bin_dir }}/ja4proxy"
        owner: "{{ ja4proxy_system_user }}"
        group: "{{ ja4proxy_system_group }}"
        mode: "0750"

    - name: Record target-side SHA256 of deployed binary
      ansible.builtin.stat:
        path: "{{ ja4proxy_bin_dir }}/ja4proxy"
        checksum_algorithm: sha256
        get_checksum: true
      register: build_target_stat

    - name: Assert deployed binary matches build-time checksum
      ansible.builtin.assert:
        that:
          - build_target_stat.stat.checksum == build_source_stat.stat.checksum
        fail_msg: >-
          Binary checksum mismatch after copy.
          Source: {{ build_source_stat.stat.checksum }}
          Target: {{ build_target_stat.stat.checksum }}
        success_msg: "JA4proxy binary SHA256 verified: {{ build_target_stat.stat.checksum }}"
        quiet: false

  when: >
    not (ja4proxy_prebuilt_binary_path is defined and ja4proxy_prebuilt_binary_path | length > 0)

# 12-D: binary provenance. Record which commit + flags produced the
# binary that is now on the target, so the weekly export manifest can
# tie a released dataset back to reproducible build inputs.

- name: Derive provenance source + sha256 (from-source path)
  tags: [artifacts, phase2]
  ansible.builtin.set_fact:
    _provenance_source: from-source
    _provenance_sha256: "{{ build_target_stat.stat.checksum }}"
  when: build_target_stat is defined

- name: Derive provenance source + sha256 (prebuilt path)
  tags: [artifacts, phase2]
  ansible.builtin.set_fact:
    _provenance_source: prebuilt
    _provenance_sha256: "{{ prebuilt_target_stat.stat.checksum }}"
  when: prebuilt_target_stat is defined

- name: Read commit hash from source tree (from-source path)
  tags: [artifacts, phase2]
  ansible.builtin.command:
    cmd: git -C {{ ja4proxy_build_machine_go_path }} rev-parse HEAD
  delegate_to: localhost
  become: false
  register: _provenance_git
  changed_when: false
  failed_when: false
  when: _provenance_source == "from-source"

- name: Extract vcs.revision from prebuilt binary (prebuilt path)
  tags: [artifacts, phase2]
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      go version -m {{ ja4proxy_prebuilt_binary_path | quote }} 2>/dev/null \
        | awk '$1 == "build" && $2 ~ /^vcs.revision=/ { sub(/^vcs.revision=/, "", $2); print $2 }'
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: _provenance_vcs
  changed_when: false
  failed_when: false
  when: _provenance_source == "prebuilt"

- name: Set provenance commit hash
  tags: [artifacts, phase2]
  ansible.builtin.set_fact:
    _provenance_commit: >-
      {{ (_provenance_git.stdout | default('') | trim)
         if _provenance_source == 'from-source'
         else (_provenance_vcs.stdout | default('') | trim) }}

- name: Set provenance build timestamp
  tags: [artifacts, phase2]
  ansible.builtin.set_fact:
    _provenance_build_ts: "{{ ansible_date_time.iso8601 }}"

- name: Render binary-provenance.yml
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: binary-provenance.yml.j2
    dest: "{{ ja4proxy_config_dir }}/binary-provenance.yml"
    owner: "{{ ja4proxy_system_user }}"
    group: "{{ ja4proxy_system_group }}"
    mode: "0640"

# 18-A: CycloneDX SBOM for the Go binary. Gated on cyclonedx-gomod
# being available on the control machine — absent = warn + skip so
# an air-gapped build host still deploys. Source path uses `mod`
# (reads go.mod); prebuilt path uses `bin` (reads go version -m).

- name: Probe for cyclonedx-gomod on control machine (18-A)
  tags: [artifacts, phase2, sbom]
  ansible.builtin.command:
    cmd: cyclonedx-gomod version
  delegate_to: localhost
  become: false
  register: _cyclonedx_probe
  changed_when: false
  failed_when: false

- name: Warn when cyclonedx-gomod is not installed (18-A)
  tags: [artifacts, phase2, sbom]
  ansible.builtin.debug:
    msg: >-
      cyclonedx-gomod not found on control machine — skipping binary
      SBOM emission. Install with:
      `go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest`
  when: _cyclonedx_probe.rc != 0

- name: Generate SBOM from Go source tree (18-A, from-source path)
  tags: [artifacts, phase2, sbom]
  ansible.builtin.command:
    cmd: >-
      cyclonedx-gomod mod
      -json
      -output {{ ja4proxy_build_machine_go_path }}/ja4proxy.cdx.json
      {{ ja4proxy_build_machine_go_path }}
  delegate_to: localhost
  become: false
  register: _sbom_mod
  changed_when: _sbom_mod.rc == 0
  when:
    - _cyclonedx_probe.rc == 0
    - _provenance_source == "from-source"

- name: Generate SBOM from prebuilt Go binary (18-A, prebuilt path)
  tags: [artifacts, phase2, sbom]
  ansible.builtin.command:
    cmd: >-
      cyclonedx-gomod bin
      -json
      -output {{ ja4proxy_prebuilt_binary_path | dirname }}/ja4proxy.cdx.json
      {{ ja4proxy_prebuilt_binary_path }}
  delegate_to: localhost
  become: false
  register: _sbom_bin
  changed_when: _sbom_bin.rc == 0
  when:
    - _cyclonedx_probe.rc == 0
    - _provenance_source == "prebuilt"

- name: Set SBOM source path (from-source)
  tags: [artifacts, phase2, sbom]
  ansible.builtin.set_fact:
    _sbom_src: "{{ ja4proxy_build_machine_go_path }}/ja4proxy.cdx.json"
  when:
    - _cyclonedx_probe.rc == 0
    - _provenance_source == "from-source"

- name: Set SBOM source path (prebuilt)
  tags: [artifacts, phase2, sbom]
  ansible.builtin.set_fact:
    _sbom_src: "{{ ja4proxy_prebuilt_binary_path | dirname }}/ja4proxy.cdx.json"
  when:
    - _cyclonedx_probe.rc == 0
    - _provenance_source == "prebuilt"

- name: Copy binary SBOM to target (18-A)
  tags: [artifacts, phase2, sbom]
  ansible.builtin.copy:
    src: "{{ _sbom_src }}"
    dest: "{{ ja4proxy_config_dir }}/ja4proxy.cdx.json"
    owner: "{{ ja4proxy_system_user }}"
    group: "{{ ja4proxy_system_group }}"
    mode: "0640"
  when:
    - _cyclonedx_probe.rc == 0
    - _sbom_src is defined

# 18-D: cosign sign-blob the binary + SBOM on the control machine,
# ship the .sig files to the target, and verify in role 03 before
# the systemd unit starts. Gated on cosign being installed AND the
# private key path being set — either missing = WARN + skip so a
# fresh checkout still deploys (opt-in while bootstrapping). The
# matching public key path is consumed in role 03 to verify.

- name: Probe for cosign on control machine (18-D)
  tags: [artifacts, phase2, cosign]
  ansible.builtin.command:
    cmd: cosign version
  delegate_to: localhost
  become: false
  register: _cosign_probe
  changed_when: false
  failed_when: false

- name: Warn when cosign is not installed (18-D)
  tags: [artifacts, phase2, cosign]
  ansible.builtin.debug:
    msg: >-
      cosign not found on control machine — skipping signed-blob
      provenance for binary + SBOM. Install with:
      `go install github.com/sigstore/cosign/v2/cmd/cosign@latest`
      (or your distro's package).
  when: _cosign_probe.rc != 0

- name: Warn when ja4proxy_cosign_private_key_path is unset (18-D)
  tags: [artifacts, phase2, cosign]
  ansible.builtin.debug:
    msg: >-
      ja4proxy_cosign_private_key_path is unset — skipping signing.
      Set it in group_vars or via -e to enable signed-blob provenance.
      Generate a keypair with: `cosign generate-key-pair`.
  when:
    - _cosign_probe.rc == 0
    - (ja4proxy_cosign_private_key_path | default('')) | length == 0

- name: Resolve binary source path on control machine (18-D)
  tags: [artifacts, phase2, cosign]
  ansible.builtin.set_fact:
    _binary_src: >-
      {{ (ja4proxy_build_machine_go_path ~ '/bin/proxy')
         if _provenance_source == 'from-source'
         else ja4proxy_prebuilt_binary_path }}
  when:
    - _cosign_probe.rc == 0
    - (ja4proxy_cosign_private_key_path | default('')) | length > 0

- name: Sign binary with cosign sign-blob (18-D)
  tags: [artifacts, phase2, cosign]
  ansible.builtin.command:
    cmd: >-
      cosign sign-blob
      --yes
      --key {{ ja4proxy_cosign_private_key_path | quote }}
      --output-signature {{ (_binary_src ~ '.sig') | quote }}
      {{ _binary_src | quote }}
  delegate_to: localhost
  become: false
  register: _cosign_sign_binary
  changed_when: _cosign_sign_binary.rc == 0
  when:
    - _cosign_probe.rc == 0
    - (ja4proxy_cosign_private_key_path | default('')) | length > 0
    - _binary_src is defined

- name: Sign SBOM with cosign sign-blob (18-D)
  tags: [artifacts, phase2, cosign]
  ansible.builtin.command:
    cmd: >-
      cosign sign-blob
      --yes
      --key {{ ja4proxy_cosign_private_key_path | quote }}
      --output-signature {{ (_sbom_src ~ '.sig') | quote }}
      {{ _sbom_src | quote }}
  delegate_to: localhost
  become: false
  register: _cosign_sign_sbom
  changed_when: _cosign_sign_sbom.rc == 0
  when:
    - _cosign_probe.rc == 0
    - (ja4proxy_cosign_private_key_path | default('')) | length > 0
    - _sbom_src is defined

- name: Copy binary signature to target (18-D)
  tags: [artifacts, phase2, cosign]
  ansible.builtin.copy:
    src: "{{ _binary_src }}.sig"
    dest: "{{ ja4proxy_bin_dir }}/ja4proxy.sig"
    owner: "{{ ja4proxy_system_user }}"
    group: "{{ ja4proxy_system_group }}"
    mode: "0640"
  when:
    - _cosign_probe.rc == 0
    - (ja4proxy_cosign_private_key_path | default('')) | length > 0
    - _binary_src is defined

- name: Copy SBOM signature to target (18-D)
  tags: [artifacts, phase2, cosign]
  ansible.builtin.copy:
    src: "{{ _sbom_src }}.sig"
    dest: "{{ ja4proxy_config_dir }}/ja4proxy.cdx.json.sig"
    owner: "{{ ja4proxy_system_user }}"
    group: "{{ ja4proxy_system_group }}"
    mode: "0640"
  when:
    - _cosign_probe.rc == 0
    - (ja4proxy_cosign_private_key_path | default('')) | length > 0
    - _sbom_src is defined
