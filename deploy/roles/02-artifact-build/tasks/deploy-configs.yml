---
# Deploy all configuration files from Jinja2 templates
# Note: proxy.yml is deployed by Role 03 (research-specific config)

- name: Deploy .env file
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/.env.j2
    dest: "{{ ja4proxy_docker_base_dir }}/.env"
    owner: root
    group: root
    mode: "0600"

- name: Deploy docker-compose.yml
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: "{{ ja4proxy_docker_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy HAProxy config
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/haproxy.cfg.j2
    dest: "{{ ja4proxy_docker_config_dir }}/haproxy/haproxy.cfg"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Caddyfile
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/caddyfile.j2
    dest: "{{ ja4proxy_docker_config_dir }}/caddy/Caddyfile"
    owner: root
    group: root
    mode: "0644"

- name: Deploy honeypot HTML
  tags: [artifacts, phase2]
  ansible.builtin.copy:
    src: templates/honeypot-index.html
    dest: "{{ ja4proxy_docker_config_dir }}/caddy/html/index.html"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Prometheus config
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/prometheus.yml.j2
    dest: "{{ ja4proxy_docker_config_dir }}/prometheus/prometheus.yml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Prometheus alert rules (13-F)
  tags: [artifacts, phase2]
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../files/prometheus/alert-rules.yml"
    dest: "{{ ja4proxy_docker_config_dir }}/prometheus/alert-rules.yml"
    owner: root
    group: root
    mode: "0644"

- name: Ensure blackbox_exporter config dir exists (13-F)
  tags: [artifacts, phase2]
  ansible.builtin.file:
    path: "{{ ja4proxy_docker_config_dir }}/blackbox"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy blackbox_exporter config (13-F)
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/blackbox.yml.j2
    dest: "{{ ja4proxy_docker_config_dir }}/blackbox/blackbox.yml"
    owner: root
    group: root
    mode: "0644"

- name: Ensure alertmanager config dir exists (13-D)
  tags: [artifacts, phase2]
  ansible.builtin.file:
    path: "{{ ja4proxy_docker_config_dir }}/alertmanager"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy alertmanager config (13-D)
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/alertmanager.yml.j2
    dest: "{{ ja4proxy_docker_config_dir }}/alertmanager/alertmanager.yml"
    owner: root
    group: root
    mode: "0640"

- name: Deploy Grafana datasources provisioning
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/grafana-datasources.yml.j2
    dest: "{{ ja4proxy_docker_config_dir }}/grafana/provisioning/datasources/datasources.yml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Grafana dashboards provisioning
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/grafana-dashboards.yml.j2
    dest: "{{ ja4proxy_docker_config_dir }}/grafana/provisioning/dashboards/dashboards.yml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Loki config
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/loki.yml.j2
    dest: "{{ ja4proxy_docker_config_dir }}/loki/loki.yml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Promtail config
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/promtail.yml.j2
    dest: "{{ ja4proxy_docker_config_dir }}/promtail/promtail.yml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Caddy honeypot HTML
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/honeypot-index.html
    dest: "{{ ja4proxy_docker_config_dir }}/caddy/html/index.html"
    owner: root
    group: root
    mode: "0644"

- name: Deploy honeypot disclosure notice (11-A)
  tags: [artifacts, phase2]
  ansible.builtin.copy:
    src: honeypot-notice.html
    dest: "{{ ja4proxy_docker_config_dir }}/caddy/html/honeypot-notice.html"
    owner: root
    group: root
    mode: "0644"

- name: Deploy GDPR privacy notice (11-B)
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/privacy.html.j2
    dest: "{{ ja4proxy_docker_config_dir }}/caddy/html/privacy.html"
    owner: root
    group: root
    mode: "0644"

- name: Ensure .well-known directory exists (11-C)
  tags: [artifacts, phase2]
  ansible.builtin.file:
    path: "{{ ja4proxy_docker_config_dir }}/caddy/html/.well-known"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy RFC 9116 security.txt (11-C)
  tags: [artifacts, phase2]
  ansible.builtin.template:
    src: templates/security.txt.j2
    dest: "{{ ja4proxy_docker_config_dir }}/caddy/html/.well-known/security.txt"
    owner: root
    group: root
    mode: "0644"

- name: Verify all config files deployed
  tags: [artifacts, phase2]
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ ja4proxy_docker_base_dir }}/docker-compose.yml"
    - "{{ ja4proxy_docker_config_dir }}/haproxy/haproxy.cfg"
    - "{{ ja4proxy_docker_config_dir }}/caddy/Caddyfile"
    - "{{ ja4proxy_docker_config_dir }}/caddy/html/index.html"
    - "{{ ja4proxy_docker_config_dir }}/prometheus/prometheus.yml"
    - "{{ ja4proxy_docker_config_dir }}/grafana/provisioning/datasources/datasources.yml"
    - "{{ ja4proxy_docker_config_dir }}/grafana/provisioning/dashboards/dashboards.yml"
    - "{{ ja4proxy_docker_config_dir }}/loki/loki.yml"
    - "{{ ja4proxy_docker_config_dir }}/promtail/promtail.yml"
  register: config_files_check

- name: Assert all config files exist
  tags: [artifacts, phase2]
  ansible.builtin.assert:
    that: config_files_check.results | map(attribute='stat.exists') | unique == [true]
    fail_msg: "One or more config files were not deployed."
    quiet: true
