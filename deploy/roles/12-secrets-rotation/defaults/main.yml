---
# 13-J: Secrets rotation defaults.
# Rotation cadence is quarterly; the operator triggers manually via
# `make rotate VM_IP=…`.

ja4proxy_rotate_redis_password: true
ja4proxy_rotate_grafana_password: true
ja4proxy_rotate_haproxy_stats_password: true

# redis_signing_key is NOT rotated — JA4proxy uses it for HMAC
# verification of proxied requests. Rotating it would invalidate
# in-flight sessions and requires a coordinated proxy reload
# strategy. See roadmap 13-J "Not in scope".
