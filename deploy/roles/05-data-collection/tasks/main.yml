---
# Role 05: Data Collection (Grafana dashboards, journald retention)
# ─────────────────────────────────────────────────────────────
# Corresponds to PHASE_05_DATA_COLLECTION.md
#
# Tasks:
#   1. Deploy Grafana dashboard JSON files
#   2. Configure journald retention
# ─────────────────────────────────────────────────────────────

- name: Deploy Grafana dashboards
  tags: [data-collection, phase5]
  ansible.builtin.copy:
    src: "grafana-dashboards/{{ item }}"
    dest: "{{ ja4proxy_docker_config_dir }}/grafana/dashboards/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - overview.json
    - tls-analysis.json
    - geographic.json
    - bot-detection.json
    - performance.json
    - honeypot.json
    - trends.json

- name: Template journald configuration
  tags: [data-collection, phase5]
  ansible.builtin.template:
    src: journald.conf.j2
    dest: /etc/systemd/journald.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart journald
