---
# Handlers for Role 03

- name: Daemon reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Reload AppArmor
  ansible.builtin.command:
    cmd: "apparmor_parser -r /etc/apparmor.d/{{ ja4proxy_apparmor_profile_name }}"
  changed_when: true

- name: Restart ja4proxy
  ansible.builtin.systemd:
    name: ja4proxy
    state: restarted
