---
# Handlers for Role 10: Go Live

- name: Restart docker compose
  ansible.builtin.command:
    cmd: "docker compose -f {{ ja4proxy_docker_base_dir }}/docker-compose.yml up -d"
  changed_when: true

- name: Restart Caddy
  ansible.builtin.command:
    cmd: "docker compose -f {{ ja4proxy_docker_base_dir }}/docker-compose.yml restart caddy"
  changed_when: true
