---
# Role 09: Image Digest Pinning
# ─────────────────────────────────────────────────────────────
# Corresponds to PHASE_08_SECURITY_HARDENING.md §8.3.1
#
# Replaces Docker image tags (e.g. haproxy:2.8-alpine) with
# SHA-256 digests to prevent supply chain attacks via tag mutation.
#
# This runs ONCE during initial deployment to resolve digests,
# then the docker-compose.yml is rewritten with pinned digests.
# ─────────────────────────────────────────────────────────────

- name: Pull all images to resolve digests
  tags: [digests, phase9]
  ansible.builtin.command:
    cmd: "docker pull {{ item }}"
  loop:
    - "{{ ja4proxy_docker_image_haproxy }}"
    - "{{ ja4proxy_docker_image_redis }}"
    - "{{ ja4proxy_docker_image_caddy }}"
    - "{{ ja4proxy_docker_image_prometheus }}"
    - "{{ ja4proxy_docker_image_grafana }}"
    - "{{ ja4proxy_docker_image_loki }}"
    - "{{ ja4proxy_docker_image_promtail }}"
    - "{{ ja4proxy_docker_image_blackbox_exporter }}"
  register: pull_results
  changed_when: false
  retries: 3
  delay: 10
  until: pull_results is not failed

- name: Resolve image digests
  tags: [digests, phase9]
  ansible.builtin.command:
    cmd: "docker inspect --format='{{ '{{' }}index .RepoDigests 0{{ '}}' }}' {{ item }}"
  loop:
    - "{{ ja4proxy_docker_image_haproxy }}"
    - "{{ ja4proxy_docker_image_redis }}"
    - "{{ ja4proxy_docker_image_caddy }}"
    - "{{ ja4proxy_docker_image_prometheus }}"
    - "{{ ja4proxy_docker_image_grafana }}"
    - "{{ ja4proxy_docker_image_loki }}"
    - "{{ ja4proxy_docker_image_promtail }}"
    - "{{ ja4proxy_docker_image_blackbox_exporter }}"
  register: digest_results
  changed_when: false

- name: Record resolved digests
  tags: [digests, phase9]
  ansible.builtin.set_fact:
    resolved_digests: >-
      {{ dict(
        ['haproxy', 'redis', 'caddy', 'prometheus', 'grafana', 'loki', 'promtail', 'blackbox_exporter']
        | zip(digest_results.results | map(attribute='stdout'))
      ) }}

- name: Save digests to file for future reference
  tags: [digests, phase9]
  ansible.builtin.copy:
    content: |
      # Image Digests — Resolved on {{ ansible_date_time.iso8601 | default('unknown') }}
      # These digests prevent supply chain attacks via Docker Hub tag mutation.
      # To update: re-run this role or `make pin-digests`
      {{ resolved_digests | to_nice_yaml(indent=2) }}
    dest: "{{ ja4proxy_docker_base_dir }}/image-digests.yml"
    owner: root
    group: root
    mode: "0644"

- name: Update docker-compose.yml with pinned digests
  tags: [digests, phase9]
  ansible.builtin.replace:
    path: "{{ ja4proxy_docker_base_dir }}/docker-compose.yml"
    # Match any "image: <short>[:@]<anything>" line — tolerates both pre-pin
    # tag form (haproxy:2.8-alpine) and post-pin digest form on re-runs
    # (haproxy@sha256:...). Replacement is keyed by service name, not by
    # the pre-existing value.
    regexp: "^(\\s*image:\\s+){{ digest_image_short[item.key] | regex_escape }}[:@][^\\s]+\\s*$"
    replace: '\1{{ item.value }}'
  loop: "{{ resolved_digests | dict2items }}"
  when: item.value | length > 0
  vars:
    digest_image_short:
      haproxy: haproxy
      redis: redis
      caddy: caddy
      prometheus: prom/prometheus
      grafana: grafana/grafana
      loki: grafana/loki
      promtail: grafana/promtail
      blackbox_exporter: prom/blackbox-exporter

- name: Read pinned docker-compose.yml for verification
  tags: [digests, phase9]
  ansible.builtin.slurp:
    src: "{{ ja4proxy_docker_base_dir }}/docker-compose.yml"
  register: pinned_compose

- name: Assert every image line is digest-pinned
  tags: [digests, phase9]
  ansible.builtin.assert:
    that:
      - (pinned_compose.content | b64decode).split('\n')
        | select('match', '^\\s*image:\\s+')
        | reject('search', '@sha256:[0-9a-f]{64}')
        | list | length == 0
    fail_msg: >-
      docker-compose.yml still contains un-pinned image references after
      role 09. This almost always means digest_image_short is missing an
      entry or a new service was added without updating this role.
    success_msg: "All image: lines are digest-pinned."

- name: Display pinned digests
  tags: [digests, phase9]
  ansible.builtin.debug:
    msg: |
      ✅ Image digests resolved and pinned:
      {% for name, digest in resolved_digests.items() %}
      - {{ name }}: {{ digest }}
      {% endfor %}
