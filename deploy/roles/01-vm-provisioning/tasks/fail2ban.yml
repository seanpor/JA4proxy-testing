---
# Fail2ban

- name: Deploy fail2ban jail.local
  ansible.builtin.template:
    src: templates/fail2ban-jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable fail2ban service
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
