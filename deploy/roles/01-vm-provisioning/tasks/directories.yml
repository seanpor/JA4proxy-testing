---
# Directory structure and system limits

- name: Create JA4proxy directories
  tags: [provisioning, phase1]
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ja4proxy_system_user }}"
    group: "{{ ja4proxy_system_group }}"
    mode: "0755"
  loop:
    - "{{ ja4proxy_bin_dir }}"
    - "{{ ja4proxy_config_dir }}"
    - "{{ ja4proxy_log_dir }}"
    - "{{ ja4proxy_geoip_dir }}"

- name: Create Docker base directories
  tags: [provisioning, phase1]
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ ja4proxy_docker_base_dir }}"
    - "{{ ja4proxy_docker_config_dir }}/haproxy"
    - "{{ ja4proxy_docker_config_dir }}/caddy/html"
    - "{{ ja4proxy_docker_config_dir }}/prometheus"
    - "{{ ja4proxy_docker_config_dir }}/grafana/provisioning/datasources"
    - "{{ ja4proxy_docker_config_dir }}/grafana/provisioning/dashboards"
    - "{{ ja4proxy_docker_config_dir }}/grafana/dashboards"
    - "{{ ja4proxy_docker_config_dir }}/loki"
    - "{{ ja4proxy_docker_config_dir }}/promtail"

- name: Append FD limits to limits.conf (idempotent)
  tags: [provisioning, phase1]
  ansible.builtin.blockinfile:
    path: /etc/security/limits.conf
    block: "{{ lookup('template', 'templates/limits.conf.j2') }}"
    marker: "# {mark} ANSIBLE MANAGED — JA4proxy FD limits"
    state: present

- name: Deploy conntrack sysctl
  tags: [provisioning, phase1]
  ansible.posix.sysctl:
    name: net.netfilter.nf_conntrack_max
    value: "{{ ja4proxy_conntrack_max }}"
    sysctl_file: /etc/sysctl.d/99-conntrack.conf
    reload: true
    state: present

- name: Enable IP forwarding sysctl
  tags: [provisioning, phase1]
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.conf
    reload: true
    state: present

- name: Load nf_conntrack module (may already be auto-loaded by UFW)
  # Kernel-module ops are meaningless inside a container (the host
  # kernel owns module loading), so the Molecule scenario excludes
  # them via `--skip-tags molecule-notest`. Production VMs run them.
  tags: [provisioning, phase1, molecule-notest]
  ansible.builtin.modprobe:
    name: nf_conntrack
    state: present
  register: _nf_conntrack_modprobe
  # Succeed if modprobe returns clean, OR if the module is already present
  # in the kernel (common: UFW/iptables already loaded it). Anything else
  # (missing kernel module, unprivileged, SELinux denial) should fail loudly.
  failed_when:
    - _nf_conntrack_modprobe.failed | default(false)
    - "'already' not in (_nf_conntrack_modprobe.msg | default(''))"

- name: Verify nf_conntrack is loaded
  tags: [provisioning, phase1, molecule-notest]
  ansible.builtin.command: grep -qw nf_conntrack /proc/modules
  changed_when: false
  register: _nf_conntrack_check
  failed_when: _nf_conntrack_check.rc != 0
