---
# UFW firewall rules
#
# Deployment stage controls port exposure:
#   locked/verified — only SSH (22) from admin IP, Grafana/Prometheus from admin IP
#   live            — additionally opens 80/443 to public

- name: Reset UFW
  tags: [provisioning, phase1]
  community.general.ufw:
    state: reset

- name: Set UFW default policy — deny incoming
  tags: [provisioning, phase1]
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set UFW default policy — allow outgoing
  tags: [provisioning, phase1]
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Allow SSH from admin IP only
  tags: [provisioning, phase1]
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    from_ip: "{{ ja4proxy_admin_ip }}"
    comment: "SSH from admin IP only"

- name: Allow HTTP from anywhere (Caddy ACME) — LIVE ONLY
  tags: [provisioning, phase1]
  community.general.ufw:
    rule: allow
    port: "{{ ja4proxy_haproxy_http_port }}"
    proto: tcp
    comment: "Caddy ACME HTTP (public)"
  when: ja4proxy_deployment_stage == "live"

- name: Allow HTTPS from anywhere (HAProxy TLS) — LIVE ONLY
  tags: [provisioning, phase1]
  community.general.ufw:
    rule: allow
    port: "{{ ja4proxy_haproxy_tls_port }}"
    proto: tcp
    comment: "HAProxy TLS passthrough (public)"
  when: ja4proxy_deployment_stage == "live"

- name: Allow Grafana from admin IP only
  tags: [provisioning, phase1]
  community.general.ufw:
    rule: allow
    port: "{{ ja4proxy_grafana_port }}"
    proto: tcp
    from_ip: "{{ ja4proxy_admin_ip }}"
    comment: "Grafana dashboard"

- name: Allow Prometheus from admin IP only
  tags: [provisioning, phase1]
  community.general.ufw:
    rule: allow
    port: "{{ ja4proxy_prometheus_port }}"
    proto: tcp
    from_ip: "{{ ja4proxy_admin_ip }}"
    comment: "Prometheus UI"

- name: Enable UFW logging
  tags: [provisioning, phase1]
  community.general.ufw:
    logging: "on"

- name: Enable UFW
  tags: [provisioning, phase1]
  community.general.ufw:
    state: enabled
