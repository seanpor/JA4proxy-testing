---
# Role 08: Security Hardening
# ─────────────────────────────────────────────────────────────
# Corresponds to PHASE_08_SECURITY_HARDENING.md
#
# Tasks:
#   1. Deploy sysctl hardening configs
#   2. Deploy AppArmor profile
#   3. Kernel module lockdown
#   4. AIDE file integrity monitoring
# ─────────────────────────────────────────────────────────────

- name: Deploy network sysctl hardening
  tags: [hardening, phase8]
  ansible.builtin.template:
    src: templates/sysctl-network-hardening.conf.j2
    dest: /etc/sysctl.d/99-ja4proxy-network-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

- name: Deploy process sysctl hardening
  tags: [hardening, phase8]
  ansible.builtin.template:
    src: templates/sysctl-process-hardening.conf.j2
    dest: /etc/sysctl.d/99-ja4proxy-process-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

# AppArmor profile is deployed and loaded by role 03 BEFORE the service
# starts, so confinement is active from the first ExecStart. This phase
# only verifies that the running ja4proxy process is actually confined
# by the expected profile. See docs/phases/CRITICAL_REVIEW.md §A3.
- name: Verify AppArmor profile is loaded in kernel
  tags: [hardening, phase8, apparmor]
  ansible.builtin.command:
    cmd: aa-status --enabled
  register: aa_enabled
  changed_when: false
  failed_when: aa_enabled.rc != 0

- name: Read AppArmor status
  tags: [hardening, phase8, apparmor]
  ansible.builtin.command:
    cmd: aa-status
  register: aa_status
  changed_when: false

- name: Assert ja4proxy profile is loaded and in enforce mode
  tags: [hardening, phase8, apparmor]
  ansible.builtin.assert:
    that:
      - ja4proxy_apparmor_profile_name in aa_status.stdout
    fail_msg: >-
      AppArmor profile {{ ja4proxy_apparmor_profile_name }} is not loaded.
      It should have been deployed by role 03 before the service started.

- name: Read AppArmor label of the running ja4proxy process
  tags: [hardening, phase8, apparmor]
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      pid=$(systemctl show ja4proxy -p MainPID --value)
      if [ -z "$pid" ] || [ "$pid" = "0" ]; then
        echo "ja4proxy-not-running"
        exit 1
      fi
      cat "/proc/${pid}/attr/current"
    executable: /bin/bash
  register: proc_apparmor_label
  changed_when: false

- name: Assert running ja4proxy process is confined by the expected profile
  tags: [hardening, phase8, apparmor]
  ansible.builtin.assert:
    that:
      - ja4proxy_apparmor_profile_name in proc_apparmor_label.stdout
      - "'(enforce)' in proc_apparmor_label.stdout or '(complain)' in proc_apparmor_label.stdout"
    fail_msg: >-
      /proc/<ja4proxy>/attr/current reports "{{ proc_apparmor_label.stdout }}",
      which does not match the expected profile
      {{ ja4proxy_apparmor_profile_name }}. The service template is likely
      missing the AppArmorProfile= directive, or the service was started
      before the profile was loaded. Re-run role 03 and restart ja4proxy.
    success_msg: >-
      AppArmor confinement active:
      {{ proc_apparmor_label.stdout }}

- name: Deploy kernel module lockdown
  tags: [hardening, phase8]
  ansible.builtin.copy:
    content: |
      # Lock down unnecessary kernel modules
      install dccp /bin/false
      install sctp /bin/false
      install rds /bin/false
      install tipc /bin/false
      install n-hdlc /bin/false
      install ax25 /bin/false
      install netrom /bin/false
      install x25 /bin/false
      install rose /bin/false
      install decnet /bin/false
      install econet /bin/false
      install af_802154 /bin/false
      install ipx /bin/false
      install appletalk /bin/false
    dest: /etc/modprobe.d/99-ja4proxy-lockdown.conf
    owner: root
    group: root
    mode: "0600"

- name: Initialize AIDE database (first run only)
  tags: [hardening, phase8]
  ansible.builtin.command:
    cmd: aideinit
    creates: /var/lib/aide/aide.db.new
  changed_when: true

- name: AIDE hardening summary
  tags: [hardening, phase8]
  ansible.builtin.debug:
    msg: |
      ✅ Security hardening applied.
      - sysctl: network + process hardening deployed
      - AppArmor: JA4proxy profile loaded
      - Kernel modules: unnecessary modules blocked
      - AIDE: file integrity monitoring initialized
      Note: Full kernel lockdown requires a reboot.
