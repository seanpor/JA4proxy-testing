---
# Handlers for Role 08: Security Hardening

- name: Reload sysctl
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: false

- name: Reload AppArmor
  ansible.builtin.command:
    cmd: apparmor_parser -r /etc/apparmor.d/opt.ja4proxy.bin.ja4proxy
  changed_when: true

- name: Daemon reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
