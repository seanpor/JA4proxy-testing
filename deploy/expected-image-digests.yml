# 18-G: Expected sha256 digests for every Docker image referenced
# from `deploy/templates/docker-compose.yml.j2` (one entry per
# `ja4proxy_docker_image_*` var in group_vars/all.yml).
#
# Refresh with `make update-digests` (queries Docker Hub and
# rewrites this file). The weekly digest-update workflow does the
# same and opens a PR if anything changed.
#
# Sentinel value: `<image>:<tag>@sha256:<64 zeros>` means "not
# pinned yet" — the slot is reserved but the script hasn't run.
# Real digests overwrite the sentinel on the first refresh.
#
# Phase 20 P0-2 (2026-04-22): this file is now enforced by role 09.
# After `docker pull`, role 09 asserts the pulled digest equals the
# pinned value below, aborting deploy on mismatch. Sentinel zero-hash
# entries are skipped ("not pinned yet"). Set
# `ja4proxy_digest_pin_enforced=false` to bypass for local / air-gapped
# testing.
haproxy: "haproxy:3.4-alpine@sha256:820658d9303227313f1feb164443f07319d604fed68982c918611dcaea8fb775"
