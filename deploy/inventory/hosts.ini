# JA4proxy Research VM — Ansible Inventory
#
# Usage:
#   ansible-playbook -i deploy/inventory/hosts.ini deploy/playbooks/site.yml
#
# The single host is defined by the DNS name or IP entered at playbook start.

[ja4proxy_vm]
{{ ja4proxy_vm_host | default('ja4proxy-research.example.com') }}

[ja4proxy_vm:vars]
ansible_user={{ ja4proxy_ssh_user | default('root') }}
ansible_ssh_private_key_file={{ lookup('env', 'HOME') }}/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3
